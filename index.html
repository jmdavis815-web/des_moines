<!DOCTYPE html>
<html>
<head>
  <title>Des Moines Loop</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 18px;
      background:
        radial-gradient(circle at top, rgba(90, 0, 0, 0.35), transparent 35%),
        linear-gradient(180deg, #080808 0%, #120d0d 55%, #050505 100%);
      color: #e8ded2;
      font-family: Georgia, "Times New Roman", serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .game {
      width: min(900px, 92vw);
      margin: 24px auto;
      padding: 32px;
      border: 1px solid rgba(160, 25, 25, 0.45);
      border-radius: 14px;
      background: rgba(10, 10, 10, 0.82);
      box-shadow:
        0 0 40px rgba(120, 0, 0, 0.3),
        inset 0 0 30px rgba(0, 0, 0, 0.85);
    }

    h1 {
      margin-top: 0;
      font-size: clamp(2rem, 7vw, 3.2rem);
      color: #c93b3b;
      letter-spacing: 4px;
      text-transform: uppercase;
      text-shadow: 0 0 14px rgba(201, 59, 59, 0.7);
    }

    #output {
      min-height: 340px;
      max-height: 56vh;
      overflow-y: auto;
      padding: 22px;
      white-space: pre-wrap;
      line-height: 1.55;
      color: #f1e7dc;
      background:
        linear-gradient(rgba(0, 0, 0, 0.72), rgba(0, 0, 0, 0.9)),
        #111;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-left: 4px solid #7b1717;
      border-radius: 10px;
      box-shadow: inset 0 0 25px rgba(0, 0, 0, 0.9);
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-top: 18px;
    }

    #action {
      flex: 1;
      padding: 14px;
      color: #f4e8dd;
      background: #0b0b0b;
      border: 1px solid rgba(201, 59, 59, 0.55);
      border-radius: 8px;
      min-width: 0;
      font-size: 16px;
    }

    button {
      padding: 14px 22px;
      color: #fff;
      background: linear-gradient(180deg, #8a1c1c, #3d0909);
      border: 1px solid #b23a3a;
      border-radius: 8px;
      font-weight: bold;
      letter-spacing: 1px;
      cursor: pointer;
      box-shadow: 0 0 14px rgba(120, 0, 0, 0.45);
    }

    button:hover {
      background: linear-gradient(180deg, #aa2626, #4c0c0c);
    }

    #retryButton {
      display: none;
      margin-top: 14px;
      width: 100%;
      background: linear-gradient(180deg, #5e1010, #250505);
      border: 1px solid rgba(255, 120, 120, 0.35);
    }

    #retryButton:hover {
      background: linear-gradient(180deg, #7c1616, #320808);
    }

    .error-text {
      color: #ff9b9b;
      text-shadow: 0 0 10px rgba(255, 0, 0, 0.35);
    }

    .loading {
      margin-top: 18px;
      display: none;
    }

    .loading-label {
      margin-bottom: 8px;
      color: #d8b4b4;
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: 0.85;
    }

    .loading-bar {
      height: 14px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(180, 40, 40, 0.35);
      box-shadow: inset 0 0 12px rgba(0, 0, 0, 0.8);
    }

    .loading-fill {
      width: 35%;
      height: 100%;
      border-radius: 999px;
      background:
        linear-gradient(
          90deg,
          #2b0000,
          #8f1414,
          #d13b3b,
          #8f1414,
          #2b0000
        );
      box-shadow: 0 0 16px rgba(180, 20, 20, 0.7);
      animation: creep 1.8s infinite linear;
    }

    @keyframes creep {
      from { transform: translateX(-120%); }
      to { transform: translateX(320%); }
    }
    
    @media (max-width: 640px) {
      body {
        padding: 10px;
        align-items: stretch;
      }

      .game {
        width: 100%;
        min-height: calc(100vh - 20px);
        margin: 0;
        padding: 18px;
        border-radius: 10px;
      }

      h1 {
        margin-bottom: 16px;
        letter-spacing: 2px;
        line-height: 1.05;
        text-align: center;
      }

      #output {
        min-height: 48vh;
        max-height: 54vh;
        padding: 16px;
        font-size: 15px;
        line-height: 1.5;
      }

      .controls {
        flex-direction: column;
        gap: 12px;
      }

      #action,
      button {
        width: 100%;
        font-size: 16px;
      }

      button {
        padding: 15px 18px;
      }
    }
  </style>
</head>
<body>
  <main class="game">
    <h1>Des Moines Loop</h1>

    <pre id="output">You are asleep in your apartment. Somewhere in the dark, a voice knows your name.</pre>

    <div class="controls">
      <input id="action" placeholder="What do you do?">
      <button onclick="sendAction()">Act</button>
    </div>

    <div class="loading" id="loading">
      <div class="loading-label">
        The loop is choosing how the day breaks...
      </div>
      <div class="loading-bar">
        <div class="loading-fill"></div>
      </div>
    </div>
    
    <button id="retryButton" type="button" onclick="retryLastAction()">
      Retry Connection To The Loop
    </button>
  </main>

  <script>
    window.isThinking = false;

    async function sendAction() {
      const input = document.getElementById("action");
      const output = document.getElementById("output");
      const loading = document.getElementById("loading");
      const retryButton = document.getElementById("retryButton");
      const actButton = document.querySelector(".controls button");
      const action = input.value.trim();

      if (!action || window.isThinking) return;

      window.lastAction = action;
      window.isThinking = true;

      retryButton.style.display = "none";

      loading.style.display = "block";

      actButton.disabled = true;
      actButton.style.opacity = "0.6";

      try {
        const response = await fetch("http://localhost:5000/act", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ action })
        });

        loading.style.display = "none";

        actButton.disabled = false;
        actButton.style.opacity = "1";
        window.isThinking = false;

        if (!response.ok) {
          throw new Error("The loop rejected the request.");
        }
        
        const data = await response.json();

        if (data.error) {
          output.innerHTML =
            '<span class="error-text">' + data.error + '</span>';
          retryButton.style.display = "block";
        } else {
          output.textContent = data.result;
        }

      } catch (error) {
        loading.style.display = "none";

        actButton.disabled = false;
        actButton.style.opacity = "1";
        window.isThinking = false;

              output.innerHTML = `
<span class="error-text">
The connection to reality was interrupted.

The future failed to resolve.

Try reconnecting to the loop.
</span>
        `;

        retryButton.style.display = "block";

      }

      input.value = "";
    }

    function retryLastAction() {
      const input = document.getElementById("action");

      if (window.lastAction && !window.isThinking) {
        input.value = window.lastAction;
        sendAction();
      }
    }
  </script>
</body>
</html>
